<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZARIS — Alta y Modificación de Empresa">
    <title>ZARIS — Empresa</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .z-form-card { animation: z-scaleIn 0.4s var(--z-ease); }

        .z-search-panel {
            background: linear-gradient(135deg, #FFF8E1 0%, #FFFDF5 100%);
            border-radius: var(--z-radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1.5px solid #FFECB3;
        }
        .z-search-panel__title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--z-primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .z-search-result {
            background: var(--z-bg-card);
            border-radius: var(--z-radius);
            padding: 1rem 1.25rem;
            margin-top: 1rem;
            border: 1px solid var(--z-border);
            display: none;
            animation: z-slideDown 0.3s var(--z-ease);
        }
        .z-search-result.visible { display: block; }
        .z-search-result__name {
            font-weight: 700;
            color: var(--z-primary);
            font-size: 1.05rem;
        }
        .z-search-result__detail {
            font-size: 0.85rem;
            color: var(--z-text2);
            margin-top: 4px;
        }

        .z-cuil-group {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .z-cuil-group .z-form-group { flex: 1; }

        .z-form-state {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .z-form-state--new { background: #E8F5E9; color: #2E7D32; }
        .z-form-state--edit { background: #FFF8E1; color: #F57F17; }
    </style>
</head>
<body>
    <div class="z-app">
        <!-- Header -->
        <header class="z-header">
            <a href="menu.html" class="z-header__brand">
                <span>
                    <span class="z-header__title">ZARIS</span>
                    <span class="z-header__subtitle">Gestión Estatal</span>
                </span>
            </a>
            <nav class="z-header__nav">
                <a href="menu.html" class="z-header__btn" id="btn-volver-menu">
                    ← Menú BUC
                </a>
            </nav>
        </header>

        <!-- Main -->
        <main class="z-main">
            <!-- Breadcrumb -->
            <nav class="z-breadcrumb">
                <a href="menu.html">BUC</a>
                <span class="z-breadcrumb__sep">›</span>
                <span class="z-breadcrumb__current">Empresa</span>
            </nav>

            <!-- ═══════════ BÚSQUEDA ═══════════ -->
            <div class="z-search-panel" id="search-panel">
                <div class="z-search-panel__title">
                    🔍 Buscar Empresa Existente
                </div>
                <!-- Toggle tipo búsqueda -->
                <div style="display:flex;gap:6px;margin-bottom:0.6rem;">
                    <button type="button" class="z-btn z-btn--xs z-btn--primary" id="btn-modo-numero" title="Buscar por CUIT"># CUIT</button>
                    <button type="button" class="z-btn z-btn--xs z-btn--ghost"   id="btn-modo-texto"  title="Buscar por nombre">Aa Nombre</button>
                </div>
                <div class="z-search-box">
                    <div class="z-form-group">
                        <input type="text" class="z-input" id="search-query"
                               placeholder="Ingresá CUIT de la empresa..."
                               autofocus>
                    </div>
                    <button class="z-btn z-btn--primary" id="btn-buscar">
                        🔍 Buscar
                    </button>
                    <button class="z-btn z-btn--accent" id="btn-nuevo">
                        ✚ Nuevo
                    </button>
                </div>
                <div class="z-search-result" id="search-result">
                    <div class="z-search-result__name" id="result-name"></div>
                    <div class="z-search-result__detail" id="result-detail"></div>
                    <div id="result-list" style="margin-top:8px;"></div>
                    <div style="margin-top: 10px; display: flex; gap: 8px;" id="result-actions">
                        <button class="z-btn z-btn--sm z-btn--primary" id="btn-editar-encontrado" style="display:none;">
                            ✏️ Editar
                        </button>
                        <button class="z-btn z-btn--sm z-btn--ghost" id="btn-consultar-encontrado" style="display:none;">
                            👁 Consultar
                        </button>
                        <button class="z-btn z-btn--sm z-btn--ghost" id="btn-nuevo-forzar">
                            ✚ Alta nueva de todas formas
                        </button>
                    </div>
                </div>
            </div>

            <!-- ═══════════ FORMULARIO EMPRESA ═══════════ -->
            <div class="z-card z-form-card" id="form-card" style="display:none;">
                <div class="z-card__header">
                    <h2 class="z-card__title">
                        🏢 <span id="form-title">Alta de Empresa</span>
                    </h2>
                    <span class="z-form-state z-form-state--new" id="form-state">
                        ● NUEVO
                    </span>
                </div>

                <div class="z-card__body">
                    <form id="form-empresa" autocomplete="off">
                        <input type="hidden" id="emp-id" name="id_empresa">

                        <!-- ── Identificación ── -->
                        <div class="z-section-title">📋 Identificación</div>

                        <div class="z-form-row z-form-row--2">
                            <!-- CUIT -->
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-cuit">CUIT</label>
                                <div class="z-cuil-group">
                                    <div class="z-form-group" style="margin-bottom:0">
                                        <input type="text" class="z-input" id="emp-cuit" name="cuit"
                                               placeholder="XX-XXXXXXXX-X" maxlength="13" required>
                                        <div class="z-input-error" id="err-cuit"></div>
                                    </div>
                                    <button type="button" class="z-btn z-btn--ghost z-btn--sm" id="btn-validar-cuit"
                                            title="Validar CUIT (futuro: API ARCA)" style="white-space:nowrap;">
                                        Validar
                                    </button>
                                </div>
                            </div>
                            <!-- Nombre -->
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-nombre">Nombre de Empresa</label>
                                <input type="text" class="z-input" id="emp-nombre" name="nombre"
                                       placeholder="Razón social" maxlength="100" required>
                                <div class="z-input-error" id="err-nombre"></div>
                            </div>
                        </div>

                        <!-- Actividad -->
                        <div class="z-form-row" style="margin-top:0.5rem;">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-actividad">Actividad Económica (CLAE)</label>
                                <!-- Filtro de búsqueda para CLAE -->
                                <input type="text" class="z-input" id="clae-filtro"
                                       placeholder="Filtrar actividades..." autocomplete="off"
                                       style="margin-bottom:4px;">
                                <select class="z-select" id="emp-actividad" name="id_actividad" required size="1">
                                    <option value="">Cargando...</option>
                                </select>
                                <div class="z-input-error" id="err-actividad"></div>
                            </div>
                            <div class="z-form-group" style="display:flex;align-items:flex-end;padding-bottom:1.1rem;">
                                <span class="z-badge" id="badge-categoria" style="display:none;"></span>
                            </div>
                        </div>

                        <!-- ── Domicilio ── -->
                        <div class="z-section-title" style="margin-top:1rem;">🏠 Domicilio</div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-calle">Calle y Altura</label>
                                <input type="text" class="z-input" id="emp-calle" name="calle"
                                       placeholder="Dirección de la empresa" maxlength="200" required>
                                <div class="z-input-error" id="err-calle"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-localidad">Localidad / Barrio</label>
                                <input type="text" class="z-input" id="emp-localidad" name="localidad"
                                       maxlength="100" required>
                                <div class="z-input-error" id="err-localidad"></div>
                            </div>
                        </div>

                        <div class="z-form-row z-form-row--1">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-provincia">Estado / Provincia</label>
                                <input type="text" class="z-input" id="emp-provincia" name="provincia" maxlength="100" required>
                                <div class="z-input-error" id="err-provincia"></div>
                            </div>
                        </div>
                        <!-- Lat/Long ocultos -->
                        <input type="hidden" id="emp-latitud" name="latitud">
                        <input type="hidden" id="emp-longitud" name="longitud">

                        <!-- ── Contacto ── -->
                        <div class="z-section-title" style="margin-top:1rem;">📞 Contacto</div>

                        <div class="z-form-row z-form-row--2">
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-telefono">Teléfono</label>
                                <input type="text" class="z-input" id="emp-telefono" name="telefono"
                                       placeholder="Cód. área + número (10 dígitos)" maxlength="10" required>
                                <div class="z-input-hint">Sin el 0 del código de área. Ej: 1155667788</div>
                                <div class="z-input-error" id="err-telefono"></div>
                            </div>
                            <div class="z-form-group">
                                <label class="z-label z-label--required" for="emp-email">Email</label>
                                <input type="email" class="z-input" id="emp-email" name="email"
                                       placeholder="empresa@correo.com" maxlength="150" required>
                                <div class="z-input-error" id="err-email"></div>
                            </div>
                        </div>



                        <!-- ── Observaciones ── -->
                        <div class="z-section-title" style="margin-top:1rem;">📝 Observaciones</div>

                        <div class="z-form-group">
                            <textarea class="z-textarea" id="emp-observaciones" name="observaciones"
                                      placeholder="Notas adicionales (máx. 500 caracteres)"
                                      maxlength="500" rows="3"></textarea>
                            <div class="z-input-hint">
                                <span id="obs-count">0</span>/500 caracteres
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Footer -->
                <div class="z-card__footer">
                    <button class="z-btn z-btn--ghost" id="btn-cancelar">
                        ✕ Cancelar
                    </button>
                    <button class="z-btn z-btn--accent z-btn--lg" id="btn-guardar">
                        💾 Guardar Empresa
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="z-toast-container" id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/empresa.js"></script>
</body>
</html>
