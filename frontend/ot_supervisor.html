<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZARIS — Órdenes de Trabajo · Supervisor</title>
  <script>
    if (window.self === window.top) {
      var p = window.location.pathname.replace(/^.*\//, 'frontend/');
      var s = window.location.search || '';
      window.location.replace('../index.html?modulo=' + encodeURIComponent(p + s));
    } else {
      var st = document.createElement('style');
      st.textContent = '.z-header{display:none!important}';
      document.head.appendChild(st);
    }
  </script>
  <link rel="stylesheet" href="../design-system/fonts/fonts.css">
  <link rel="stylesheet" href="../design-system/colors_and_type.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--zaris-cream); font-family: var(--font-display); color: var(--fg-1); min-height: 100vh; }
    .page { padding: 24px 28px; }

    .zaris-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; margin: 0 0 14px; }
    .zaris-breadcrumb a { color: var(--zaris-orange); text-decoration: none; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .zaris-breadcrumb a:hover { text-decoration: underline; }
    .zaris-breadcrumb__sep { color: var(--fg-3); }
    .zaris-breadcrumb__current { color: var(--fg-2); font-weight: 600; }

    h1.title { font-weight: 600; font-size: 1.6rem; letter-spacing: -0.02em; margin: 0 0 4px; }
    p.subtitle { color: var(--fg-3); font-size: 0.86rem; margin-bottom: 18px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-primary); margin-bottom: 14px; }
    .tab {
      background: transparent; border: none; cursor: pointer;
      font-family: var(--font-display); font-size: 0.92rem; font-weight: 500;
      padding: 10px 18px; color: var(--fg-3);
      border-bottom: 2px solid transparent;
      transition: 0.15s; margin-bottom: -1px;
    }
    .tab:hover { color: var(--fg-1); }
    .tab.active { color: var(--zaris-orange); border-bottom-color: var(--zaris-orange); font-weight: 600; }
    .tab__count {
      background: var(--surface-300); color: var(--fg-2);
      padding: 1px 8px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 600;
      margin-left: 6px;
    }
    .tab.active .tab__count { background: var(--zaris-orange); color: white; }

    /* ── Toolbar ── */
    .toolbar {
      background: #e3f2fd; border: 1px solid #bbdefb;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 12px;
    }
    .toolbar__title { font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #1565c0; margin-bottom: 8px; }
    .toolbar__row { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.7rem; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.04em; }
    .field input, .field select {
      font-family: var(--font-display); font-size: 0.84rem;
      padding: 6px 10px; border-radius: 7px;
      border: 1px solid var(--border-medium); background: var(--surface-100);
      color: var(--fg-1); min-width: 150px;
    }
    .field input.search-wide { min-width: 260px; }

    .btn { font-family: var(--font-display); font-size: 0.84rem; cursor: pointer; border-radius: 8px; padding: 7px 14px; transition: 0.15s; border: 1px solid transparent; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--zaris-orange); color: white; border-color: var(--zaris-orange); }
    .btn-primary:hover:not(:disabled) { filter: brightness(0.95); }
    .btn-outline { background: var(--surface-100); color: var(--fg-1); border-color: var(--border-medium); }
    .btn-outline:hover { background: var(--surface-300); }
    .btn-sm { font-size: 0.78rem; padding: 5px 10px; }
    .btn-warn { background: #ef6c00; color: white; border-color: #ef6c00; }
    .btn-warn:hover { filter: brightness(0.95); }

    /* ── Stats ── */
    .stats { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .stats__chip { background: var(--surface-100); border: 1px solid var(--border-primary); border-radius: 999px; padding: 4px 11px; font-size: 0.76rem; color: var(--fg-2); }
    .stats__chip strong { color: var(--fg-1); font-weight: 600; margin-right: 4px; }

    /* ── Selection bar ── */
    .selbar {
      display: none;
      background: var(--fg-1); color: var(--surface-100);
      border-radius: 10px; padding: 9px 16px; margin-bottom: 10px;
      align-items: center; justify-content: space-between;
    }
    .selbar.open { display: flex; }
    .selbar__info { font-size: 0.84rem; }
    .selbar__info strong { color: var(--zaris-orange); }
    .selbar__actions { display: flex; gap: 8px; }

    /* ── Tabla — scroll horizontal si pasa el viewport ── */
    .card {
      background: var(--surface-100); border: 1px solid var(--border-primary);
      border-radius: 12px; overflow-x: auto; overflow-y: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; min-width: 1100px; }
    th { text-align: left; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-3); padding: 9px 12px; border-bottom: 1px solid var(--border-primary); background: var(--surface-300); white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border-primary); vertical-align: middle; }
    tbody tr:hover { background: var(--surface-300); }
    tbody tr.selected { background: rgba(245, 78, 0, 0.06); }
    tbody tr:last-child td { border-bottom: none; }

    th.col-check, td.col-check { width: 32px; padding-right: 0; }
    th.col-sla, td.col-sla { min-width: 160px; }
    th.col-action, td.col-action { min-width: 110px; white-space: nowrap; }
    input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--zaris-orange); }

    .nro { font-family: var(--font-mono); font-size: 0.78rem; color: var(--fg-2); white-space: nowrap; }
    .truncate { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; border: 1px solid transparent; }
    .badge--alta   { background: #ffebee; color: #c62828; border-color: #ffcdd2; }
    .badge--media  { background: #fff3e0; color: #ef6c00; border-color: #ffe0b2; }
    .badge--baja   { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
    .badge--sin    { background: #eceff1; color: #455a64; border-color: #cfd8dc; }
    .badge--gest   { background: #e3f2fd; color: #1565c0; border-color: #bbdefb; }
    .badge--esp    { background: #fff8e1; color: #f57f17; border-color: #ffecb3; }
    .badge--audit  { background: #f3e5f5; color: #6a1b9a; border-color: #e1bee7; }

    /* ── SLA cell ── */
    .sla { display: flex; flex-direction: column; gap: 1px; line-height: 1.2; white-space: nowrap; }
    .sla__main { font-size: 0.84rem; font-weight: 600; }
    .sla__sub { font-size: 0.68rem; color: var(--fg-3); }
    .sla--ok       { color: #2e7d32; }
    .sla--warn     { color: #ef6c00; }
    .sla--danger   { color: var(--color-error); }
    .sla--vencido  { color: white; background: var(--color-error); padding: 3px 8px; border-radius: 6px; align-self: flex-start; font-size: 0.78rem; }

    .empty { padding: 36px; text-align: center; color: var(--fg-3); font-size: 0.88rem; }
    .loading { padding: 26px; text-align: center; color: var(--fg-3); font-size: 0.84rem; }

    .asign-cell { display: flex; flex-direction: column; gap: 1px; }
    .asign-cell__nro { font-family: var(--font-mono); font-size: 0.74rem; color: var(--fg-3); }
    .asign-cell__name { font-size: 0.82rem; }
    .asign-cell__kind { font-size: 0.68rem; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(38,37,30,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface-100); border-radius: 12px; padding: 22px 26px; width: min(560px, 92vw); max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
    .modal__title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .modal__subtitle { font-size: 0.82rem; color: var(--fg-3); margin-bottom: 14px; }
    .modal__chip-list { display: flex; flex-wrap: wrap; gap: 5px; max-height: 100px; overflow-y: auto; margin-bottom: 14px; padding: 8px; background: var(--surface-300); border-radius: 8px; }
    .modal__chip { background: var(--surface-100); border: 1px solid var(--border-medium); border-radius: 999px; padding: 2px 9px; font-size: 0.7rem; font-family: var(--font-mono); color: var(--fg-2); }
    .modal__field { margin-bottom: 12px; }
    .modal__field label { display: block; font-size: 0.78rem; color: var(--fg-2); margin-bottom: 5px; font-weight: 500; }
    .modal__field select, .modal__field textarea, .modal__field input { width: 100%; font-family: var(--font-display); font-size: 0.86rem; padding: 8px 11px; border-radius: 8px; border: 1px solid var(--border-medium); background: var(--surface-100); color: var(--fg-1); }
    .modal__field textarea { min-height: 70px; resize: vertical; }
    .modal__field--required label::after { content: ' *'; color: var(--color-error); }
    .modal__radio { display: flex; gap: 14px; margin-bottom: 10px; }
    .modal__radio label { display: flex; align-items: center; gap: 6px; font-size: 0.86rem; cursor: pointer; }
    .modal__current { background: var(--surface-300); border-radius: 8px; padding: 8px 11px; font-size: 0.8rem; margin-bottom: 12px; color: var(--fg-2); }
    .modal__current strong { color: var(--fg-1); }
    .modal__actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface-100); border: 1px solid var(--border-medium); border-left: 4px solid var(--zaris-orange); padding: 12px 18px; border-radius: 8px; font-size: 0.86rem; box-shadow: 0 6px 22px rgba(0,0,0,0.12); display: none; max-width: 420px; z-index: 2000; }
    .toast.show { display: block; animation: toast-in 0.2s ease-out; }
    .toast--ok    { border-left-color: #2e7d32; }
    .toast--err   { border-left-color: var(--color-error); }
    @keyframes toast-in { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="page">
    <nav class="zaris-breadcrumb" aria-label="Ruta de navegación">
      <a href="#" data-bc-home>INICIO</a>
      <span class="zaris-breadcrumb__sep">›</span>
      <span class="zaris-breadcrumb__current">Órdenes de Trabajo · Supervisor</span>
    </nav>

    <h1 class="title">Mesa del Supervisor</h1>
    <p class="subtitle">Gestioná asignación y reasignación de OTs.</p>

    <div class="tabs">
      <button class="tab active" data-tab="asignar">Asignar <span class="tab__count" id="cnt-asignar">0</span></button>
      <button class="tab" data-tab="reasignar">Reasignar <span class="tab__count" id="cnt-reasignar">0</span></button>
    </div>

    <div class="toolbar">
      <div class="toolbar__title">Buscar y filtrar</div>
      <div class="toolbar__row">
        <div class="field">
          <label>Nº reclamo o tipo</label>
          <input type="text" id="f-texto" class="search-wide" placeholder="Ej: REC-2026-000001 o bache" autocomplete="off">
        </div>
        <div class="field" id="field-estado-reasign" style="display:none;">
          <label>Estado</label>
          <select id="f-estado">
            <option value="">Todos</option>
            <option value="En gestión">En gestión</option>
            <option value="En espera">En espera</option>
            <option value="En auditoría">En auditoría</option>
          </select>
        </div>
        <div class="field">
          <label>Prioridad</label>
          <select id="f-prioridad">
            <option value="">Todas</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
        <button class="btn btn-outline" id="btn-refresh">Refrescar</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="selbar" id="selbar">
      <div class="selbar__info"><strong id="sel-count">0</strong> reclamos seleccionados</div>
      <div class="selbar__actions">
        <button class="btn btn-outline btn-sm" id="btn-clear-sel">Limpiar</button>
        <button class="btn btn-primary btn-sm" id="btn-asignar-lote">Asignar OT en lote</button>
      </div>
    </div>

    <div class="card">
      <table id="tabla">
        <thead id="thead"></thead>
        <tbody id="tbody"><tr><td colspan="11" class="loading">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Modal asignar (Tab 1) -->
  <div class="modal-backdrop" id="modal-asignar">
    <div class="modal">
      <div class="modal__title" id="modal-asignar-title">Asignar Orden de Trabajo</div>
      <div class="modal__subtitle" id="modal-asignar-subtitle">—</div>
      <div class="modal__chip-list" id="modal-asignar-chips" style="display:none;"></div>

      <div class="modal__radio">
        <label><input type="radio" name="modo-as" value="agente" checked> Agente individual</label>
        <label><input type="radio" name="modo-as" value="equipo"> Equipo</label>
      </div>

      <div class="modal__field" id="field-as-agente">
        <label>Agente</label>
        <select id="sel-as-agente"><option value="">Cargando...</option></select>
      </div>
      <div class="modal__field" id="field-as-equipo" style="display:none;">
        <label>Equipo</label>
        <select id="sel-as-equipo"><option value="">Cargando...</option></select>
      </div>
      <div class="modal__field">
        <label>Observaciones (opcional, aplica a todas las OTs)</label>
        <textarea id="obs-as" placeholder="Notas para el agente/equipo..."></textarea>
      </div>
      <div class="modal__actions">
        <button class="btn btn-outline" data-close-modal="modal-asignar">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirm-asignar">Crear OT</button>
      </div>
    </div>
  </div>

  <!-- Modal reasignar (Tab 2) -->
  <div class="modal-backdrop" id="modal-reasignar">
    <div class="modal">
      <div class="modal__title">Reasignar OT</div>
      <div class="modal__subtitle" id="modal-reasign-subtitle">—</div>

      <div class="modal__current" id="modal-reasign-current">—</div>

      <div class="modal__radio">
        <label><input type="radio" name="modo-re" value="agente" checked> Agente individual</label>
        <label><input type="radio" name="modo-re" value="equipo"> Equipo</label>
      </div>
      <div class="modal__field" id="field-re-agente">
        <label>Nuevo agente</label>
        <select id="sel-re-agente"><option value="">Cargando...</option></select>
      </div>
      <div class="modal__field" id="field-re-equipo" style="display:none;">
        <label>Nuevo equipo</label>
        <select id="sel-re-equipo"><option value="">Cargando...</option></select>
      </div>
      <div class="modal__field modal__field--required">
        <label>Motivo de la reasignación</label>
        <textarea id="nota-re" placeholder="Indicá por qué se reasigna..."></textarea>
      </div>
      <div class="modal__actions">
        <button class="btn btn-outline" data-close-modal="modal-reasignar">Cancelar</button>
        <button class="btn btn-warn" id="btn-confirm-reasignar">Reasignar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://127.0.0.1:8000' : 'https://zaris-api-production-bf0b.up.railway.app';

    // ── Sesión ────────────────────────────────────────────────────
    const _raw = localStorage.getItem('zaris_session');
    if (!_raw) {
      if (window.self !== window.top) window.parent.location.href = '../index.html';
      else window.location.href = '../index.html';
    }
    const _sess = _raw ? JSON.parse(_raw) : null;
    const _authHeaders = () => ({ 'Authorization': 'Bearer ' + _sess.access_token, 'Content-Type': 'application/json' });
    function _handleUnauth() {
      localStorage.removeItem('zaris_session');
      if (window.self !== window.top) window.parent.location.href = '../index.html';
      else window.location.href = '../index.html';
    }

    document.querySelectorAll('[data-bc-home]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        if (window.parent && window.parent.shellNavigate) window.parent.shellNavigate('frontend/welcome.html');
        else window.location.href = '../index.html';
      });
    });

    // ── Helpers ───────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function showToast(msg, kind='ok') {
      const t = $('toast');
      t.className = 'toast show toast--' + kind;
      t.textContent = msg;
      setTimeout(() => t.className = 'toast', 3000);
    }
    function badgeEstado(e) {
      const map = { 'Sin asignar':['badge--sin','Sin asignar'], 'En gestión':['badge--gest','En gestión'], 'En espera':['badge--esp','En espera'], 'En auditoría':['badge--audit','En auditoría'] };
      const [cls, lbl] = map[e] || ['badge--sin', e || '—'];
      return `<span class="badge ${cls}">${escapeHtml(lbl)}</span>`;
    }
    function badgePrio(p) {
      const cls = p === 'Alta' ? 'badge--alta' : p === 'Baja' ? 'badge--baja' : 'badge--media';
      return `<span class="badge ${cls}">${escapeHtml(p || 'Media')}</span>`;
    }
    function formatSLA(sla_vencimiento, sla_dias) {
      if (!sla_vencimiento) {
        return `<span class="sla__sub">${sla_dias != null ? sla_dias + 'd (sin fecha)' : '—'}</span>`;
      }
      const venc = new Date(sla_vencimiento);
      const now = new Date();
      const ms = venc - now;
      const minutes = Math.floor(Math.abs(ms) / 60000);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      const fmtAbs = () => {
        if (days > 0) return `${days}d ${hours % 24}h`;
        if (hours > 0) return `${hours}h ${minutes % 60}m`;
        return `${minutes}m`;
      };
      if (ms < 0) return `<div class="sla"><span class="sla--vencido">Vencido hace ${fmtAbs()}</span></div>`;
      let cls = 'sla--ok';
      if (hours < 24) cls = 'sla--warn';
      if (hours < 6) cls = 'sla--danger';
      const fecha = venc.toLocaleString('es-AR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      return `<div class="sla"><span class="sla__main ${cls}">${fmtAbs()}</span><span class="sla__sub">vence ${fecha}</span></div>`;
    }
    function asignadoActual(r) {
      if (r.ot_agente_nombre) return `<div class="asign-cell"><span class="asign-cell__nro">${escapeHtml(r.ot_activa_nro || '')}</span><span class="asign-cell__name">${escapeHtml(r.ot_agente_nombre)}</span><span class="asign-cell__kind">Agente</span></div>`;
      if (r.ot_equipo_nombre) return `<div class="asign-cell"><span class="asign-cell__nro">${escapeHtml(r.ot_activa_nro || '')}</span><span class="asign-cell__name">${escapeHtml(r.ot_equipo_nombre)}</span><span class="asign-cell__kind">Equipo</span></div>`;
      return `<span style="color:var(--fg-3);font-size:0.78rem;">—</span>`;
    }

    // ── Estado ────────────────────────────────────────────────────
    let _reclamos = [];
    let _agentes = [];
    let _equipos = [];
    let _seleccionados = new Set();
    let _tab = 'asignar';
    let _modalAsignarReclamos = [];
    let _modalReasignOT = null;

    // ── Cargar mesa ──────────────────────────────────────────────
    async function cargarMesa() {
      $('tbody').innerHTML = '<tr><td colspan="11" class="loading">Cargando...</td></tr>';
      try {
        const res = await fetch(API_BASE + '/api/v1/ot/mesa/supervisor', { headers: _authHeaders() });
        if (res.status === 401) { _handleUnauth(); return; }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        _reclamos = await res.json();
        const vivos = new Set(_reclamos.map(r => r.id_reclamo));
        _seleccionados = new Set([..._seleccionados].filter(id => vivos.has(id)));
        render();
      } catch (e) {
        console.error(e);
        $('tbody').innerHTML = `<tr><td colspan="11" class="empty">Error cargando: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    function rsTab() {
      // Filtra por tab: asignar = Sin asignar; reasignar = con OT activa
      if (_tab === 'asignar') return _reclamos.filter(r => r.estado === 'Sin asignar');
      return _reclamos.filter(r => (r.cant_ots || 0) > 0 && r.ot_activa_id);
    }

    function aplicarFiltros() {
      const txt = ($('f-texto').value || '').trim().toLowerCase();
      const fe = $('f-estado').value;
      const fp = $('f-prioridad').value;
      return rsTab().filter(r => {
        if (_tab === 'reasignar' && fe && r.estado !== fe) return false;
        if (fp && r.prioridad !== fp) return false;
        if (txt) {
          const hay = [r.nro_reclamo||'', r.tipo_nombre||'', r.descripcion||'', r.subarea_nombre||'',
                       (r.ciudadano_apellido||'') + ' ' + (r.ciudadano_nombre||''),
                       r.ot_agente_nombre||'', r.ot_equipo_nombre||'', r.ot_activa_nro||''].join(' ').toLowerCase();
          if (!hay.includes(txt)) return false;
        }
        return true;
      });
    }

    function renderHead() {
      if (_tab === 'asignar') {
        $('thead').innerHTML = `<tr>
          <th class="col-check"><input type="checkbox" id="chk-all" title="Seleccionar todos los visibles"></th>
          <th>N° reclamo</th>
          <th>Prio.</th>
          <th class="col-sla">SLA</th>
          <th>Tipo</th>
          <th>Subárea</th>
          <th>Ciudadano</th>
          <th>Descripción</th>
          <th class="col-action">Acción</th>
        </tr>`;
      } else {
        $('thead').innerHTML = `<tr>
          <th>N° reclamo</th>
          <th>Estado</th>
          <th>Prio.</th>
          <th class="col-sla">SLA</th>
          <th>Tipo</th>
          <th>Subárea</th>
          <th>Ciudadano</th>
          <th>Asignado a</th>
          <th class="col-action">Acción</th>
        </tr>`;
      }
    }

    function render() {
      // Counts globales por tab (no por filtro)
      const nAsig = _reclamos.filter(r => r.estado === 'Sin asignar').length;
      const nReas = _reclamos.filter(r => (r.cant_ots || 0) > 0 && r.ot_activa_id).length;
      $('cnt-asignar').textContent = nAsig;
      $('cnt-reasignar').textContent = nReas;

      $('field-estado-reasign').style.display = _tab === 'reasignar' ? '' : 'none';
      $('selbar').style.display = ''; // controlled by .open class
      // Selección solo aplica a tab asignar
      if (_tab === 'reasignar') _seleccionados.clear();

      renderHead();
      const filtrados = aplicarFiltros();

      // Stats por estado dentro del tab actual
      const counts = {};
      rsTab().forEach(r => { counts[r.estado] = (counts[r.estado] || 0) + 1; });
      $('stats').innerHTML = Object.entries(counts)
        .map(([k,v]) => `<span class="stats__chip"><strong>${v}</strong> ${escapeHtml(k)}</span>`).join('')
        || `<span class="stats__chip">Sin reclamos</span>`;

      const tbody = $('tbody');
      if (!filtrados.length) {
        const colspan = _tab === 'asignar' ? 9 : 9;
        tbody.innerHTML = `<tr><td colspan="${colspan}" class="empty">Sin reclamos en esta vista</td></tr>`;
        actualizarSelBar();
        return;
      }

      tbody.innerHTML = filtrados.map(r => {
        if (_tab === 'asignar') {
          const isSel = _seleccionados.has(r.id_reclamo);
          return `<tr class="${isSel?'selected':''}">
            <td class="col-check"><input type="checkbox" data-chk="${r.id_reclamo}" ${isSel?'checked':''}></td>
            <td class="nro">${escapeHtml(r.nro_reclamo || '—')}</td>
            <td>${badgePrio(r.prioridad)}</td>
            <td class="col-sla">${formatSLA(r.sla_vencimiento, r.sla_dias)}</td>
            <td class="truncate" title="${escapeHtml(r.tipo_nombre || '')}">${escapeHtml(r.tipo_nombre || '—')}</td>
            <td class="truncate" title="${escapeHtml(r.subarea_nombre || '')}">${escapeHtml(r.subarea_nombre || '—')}</td>
            <td>${escapeHtml((r.ciudadano_apellido||'') + ', ' + (r.ciudadano_nombre||''))}</td>
            <td class="truncate" title="${escapeHtml(r.descripcion || '')}">${escapeHtml(r.descripcion || '')}</td>
            <td class="col-action"><button class="btn btn-primary btn-sm" data-asignar="${r.id_reclamo}">Asignar OT</button></td>
          </tr>`;
        } else {
          return `<tr>
            <td class="nro">${escapeHtml(r.nro_reclamo || '—')}</td>
            <td>${badgeEstado(r.estado)}</td>
            <td>${badgePrio(r.prioridad)}</td>
            <td class="col-sla">${formatSLA(r.sla_vencimiento, r.sla_dias)}</td>
            <td class="truncate" title="${escapeHtml(r.tipo_nombre || '')}">${escapeHtml(r.tipo_nombre || '—')}</td>
            <td class="truncate" title="${escapeHtml(r.subarea_nombre || '')}">${escapeHtml(r.subarea_nombre || '—')}</td>
            <td>${escapeHtml((r.ciudadano_apellido||'') + ', ' + (r.ciudadano_nombre||''))}</td>
            <td>${asignadoActual(r)}</td>
            <td class="col-action"><button class="btn btn-warn btn-sm" data-reasignar="${r.id_reclamo}">Reasignar</button></td>
          </tr>`;
        }
      }).join('');

      tbody.querySelectorAll('[data-asignar]').forEach(btn => btn.addEventListener('click', () => abrirModalAsignar([parseInt(btn.dataset.asignar)])));
      tbody.querySelectorAll('[data-reasignar]').forEach(btn => btn.addEventListener('click', () => abrirModalReasignar(parseInt(btn.dataset.reasignar))));
      tbody.querySelectorAll('[data-chk]').forEach(cb => cb.addEventListener('change', () => {
        const id = parseInt(cb.dataset.chk);
        if (cb.checked) _seleccionados.add(id); else _seleccionados.delete(id);
        cb.closest('tr').classList.toggle('selected', cb.checked);
        actualizarSelBar();
        sincronizarChkAll();
      }));
      const chkAll = $('chk-all');
      if (chkAll) chkAll.addEventListener('change', e => {
        const visibles = aplicarFiltros();
        if (e.target.checked) visibles.forEach(r => _seleccionados.add(r.id_reclamo));
        else visibles.forEach(r => _seleccionados.delete(r.id_reclamo));
        render();
      });
      actualizarSelBar();
      sincronizarChkAll();
    }

    function sincronizarChkAll() {
      const chk = $('chk-all');
      if (!chk) return;
      const visibles = aplicarFiltros();
      chk.checked = visibles.length > 0 && visibles.every(r => _seleccionados.has(r.id_reclamo));
    }
    function actualizarSelBar() {
      const n = _seleccionados.size;
      $('selbar').classList.toggle('open', n > 0 && _tab === 'asignar');
      $('sel-count').textContent = n;
    }

    // ── Cargar agentes/equipos ───────────────────────────────────
    async function cargarAgentesEquipos() {
      if (_agentes.length && _equipos.length) return;
      try {
        const [resA, resE] = await Promise.all([
          fetch(API_BASE + '/api/v1/admin/agentes', { headers: _authHeaders() }),
          fetch(API_BASE + '/api/v1/admin/equipos', { headers: _authHeaders() }),
        ]);
        if (resA.status === 401 || resE.status === 401) { _handleUnauth(); return; }
        _agentes = resA.ok ? await resA.json() : [];
        _equipos = resE.ok ? await resE.json() : [];
        const optsA = '<option value="">— Seleccionar —</option>' + _agentes.map(a =>
          `<option value="${a.id_agente}">${escapeHtml((a.apellido||'') + ', ' + (a.nombre||''))}${a.legajo ? ' · #' + escapeHtml(a.legajo) : ''}</option>`).join('');
        const optsE = '<option value="">— Seleccionar —</option>' + _equipos.map(e =>
          `<option value="${e.id_equipo}">${escapeHtml(e.nombre || ('Equipo #'+e.id_equipo))}</option>`).join('');
        $('sel-as-agente').innerHTML = optsA;
        $('sel-as-equipo').innerHTML = optsE;
        $('sel-re-agente').innerHTML = optsA;
        $('sel-re-equipo').innerHTML = optsE;
      } catch (e) { console.error(e); showToast('Error cargando agentes/equipos', 'err'); }
    }

    // ── Modal asignar ────────────────────────────────────────────
    function abrirModalAsignar(ids) {
      _modalAsignarReclamos = ids.map(id => _reclamos.find(r => r.id_reclamo === id)).filter(Boolean);
      if (!_modalAsignarReclamos.length) return;
      const n = _modalAsignarReclamos.length;
      $('modal-asignar-title').textContent = n === 1 ? 'Asignar Orden de Trabajo' : `Asignar OT en lote (${n})`;
      if (n === 1) {
        const r = _modalAsignarReclamos[0];
        $('modal-asignar-subtitle').textContent = `${r.nro_reclamo} — ${r.tipo_nombre || ''} (${r.subarea_nombre || ''})`;
        $('modal-asignar-chips').style.display = 'none';
      } else {
        $('modal-asignar-subtitle').textContent = 'Mismo agente o equipo se asignará a todos los seleccionados.';
        $('modal-asignar-chips').innerHTML = _modalAsignarReclamos.map(r => `<span class="modal__chip">${escapeHtml(r.nro_reclamo)}</span>`).join('');
        $('modal-asignar-chips').style.display = 'flex';
      }
      $('obs-as').value = '';
      document.querySelector('input[name=modo-as][value=agente]').checked = true;
      toggleModoAsignar();
      $('modal-asignar').classList.add('open');
      cargarAgentesEquipos();
    }
    function toggleModoAsignar() {
      const m = document.querySelector('input[name=modo-as]:checked').value;
      $('field-as-agente').style.display = m === 'agente' ? '' : 'none';
      $('field-as-equipo').style.display = m === 'equipo' ? '' : 'none';
    }

    async function confirmarAsignar() {
      if (!_modalAsignarReclamos.length) return;
      const modo = document.querySelector('input[name=modo-as]:checked').value;
      const obs = $('obs-as').value.trim();
      const base = { observaciones: obs };
      if (modo === 'agente') {
        const v = $('sel-as-agente').value;
        if (!v) { showToast('Seleccioná un agente', 'err'); return; }
        base.id_agente = parseInt(v);
      } else {
        const v = $('sel-as-equipo').value;
        if (!v) { showToast('Seleccioná un equipo', 'err'); return; }
        base.id_equipo = parseInt(v);
      }
      const btn = $('btn-confirm-asignar');
      btn.disabled = true; btn.textContent = 'Creando...';
      let ok = 0, fail = 0;
      for (const r of _modalAsignarReclamos) {
        try {
          const res = await fetch(API_BASE + '/api/v1/ot', { method: 'POST', headers: _authHeaders(), body: JSON.stringify({ ...base, id_reclamo: r.id_reclamo }) });
          if (res.status === 401) { _handleUnauth(); return; }
          if (res.ok) ok++; else fail++;
        } catch { fail++; }
      }
      btn.disabled = false; btn.textContent = 'Crear OT';
      cerrarModal('modal-asignar');
      _seleccionados.clear();
      if (fail === 0) showToast(`${ok} OT(s) creada(s) correctamente`);
      else if (ok === 0) showToast(`Error al crear OTs (${fail} fallos)`, 'err');
      else showToast(`${ok} OT(s) creadas, ${fail} fallaron`, 'err');
      cargarMesa();
    }

    // ── Modal reasignar ──────────────────────────────────────────
    function abrirModalReasignar(idReclamo) {
      const r = _reclamos.find(x => x.id_reclamo === idReclamo);
      if (!r || !r.ot_activa_id) return;
      _modalReasignOT = r;
      $('modal-reasign-subtitle').textContent = `${r.nro_reclamo} — ${r.tipo_nombre || ''} (${r.subarea_nombre || ''})`;
      const actual = r.ot_agente_nombre
        ? `Asignado actualmente al <strong>agente ${escapeHtml(r.ot_agente_nombre)}</strong> (OT ${escapeHtml(r.ot_activa_nro||'')})`
        : r.ot_equipo_nombre
          ? `Asignado actualmente al <strong>equipo ${escapeHtml(r.ot_equipo_nombre)}</strong> (OT ${escapeHtml(r.ot_activa_nro||'')})`
          : `OT ${escapeHtml(r.ot_activa_nro||'')} — sin destinatario`;
      $('modal-reasign-current').innerHTML = actual;
      $('nota-re').value = '';
      document.querySelector('input[name=modo-re][value=agente]').checked = true;
      toggleModoReasign();
      $('modal-reasignar').classList.add('open');
      cargarAgentesEquipos();
    }
    function toggleModoReasign() {
      const m = document.querySelector('input[name=modo-re]:checked').value;
      $('field-re-agente').style.display = m === 'agente' ? '' : 'none';
      $('field-re-equipo').style.display = m === 'equipo' ? '' : 'none';
    }

    async function confirmarReasignar() {
      if (!_modalReasignOT) return;
      const modo = document.querySelector('input[name=modo-re]:checked').value;
      const nota = $('nota-re').value.trim();
      if (!nota) { showToast('La nota es obligatoria', 'err'); return; }
      const body = { nota };
      if (modo === 'agente') {
        const v = $('sel-re-agente').value;
        if (!v) { showToast('Seleccioná un agente', 'err'); return; }
        body.id_agente = parseInt(v);
      } else {
        const v = $('sel-re-equipo').value;
        if (!v) { showToast('Seleccioná un equipo', 'err'); return; }
        body.id_equipo = parseInt(v);
      }
      const btn = $('btn-confirm-reasignar');
      btn.disabled = true; btn.textContent = 'Reasignando...';
      try {
        const res = await fetch(API_BASE + `/api/v1/ot/${_modalReasignOT.ot_activa_id}/reasignar`, {
          method: 'PUT', headers: _authHeaders(), body: JSON.stringify(body)
        });
        if (res.status === 401) { _handleUnauth(); return; }
        const data = await res.json();
        if (!res.ok) { showToast(`Error: ${data.detail || res.status}`, 'err'); return; }
        cerrarModal('modal-reasignar');
        showToast(`OT reasignada a ${data.asignado_a}`);
        cargarMesa();
      } catch (e) { showToast('Error de red: ' + e.message, 'err'); }
      finally { btn.disabled = false; btn.textContent = 'Reasignar'; }
    }

    function cerrarModal(id) {
      $(id).classList.remove('open');
      if (id === 'modal-asignar') _modalAsignarReclamos = [];
      if (id === 'modal-reasignar') _modalReasignOT = null;
    }

    // ── Wire up ──────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
      _tab = t.dataset.tab;
      $('f-estado').value = '';
      render();
    }));

    let _debounceTimer = null;
    $('f-texto').addEventListener('input', () => { clearTimeout(_debounceTimer); _debounceTimer = setTimeout(render, 150); });
    $('f-estado').addEventListener('change', render);
    $('f-prioridad').addEventListener('change', render);
    $('btn-refresh').addEventListener('click', cargarMesa);
    $('btn-clear-sel').addEventListener('click', () => { _seleccionados.clear(); render(); });
    $('btn-asignar-lote').addEventListener('click', () => { if (_seleccionados.size) abrirModalAsignar([..._seleccionados]); });

    $('btn-confirm-asignar').addEventListener('click', confirmarAsignar);
    $('btn-confirm-reasignar').addEventListener('click', confirmarReasignar);
    document.querySelectorAll('input[name=modo-as]').forEach(r => r.addEventListener('change', toggleModoAsignar));
    document.querySelectorAll('input[name=modo-re]').forEach(r => r.addEventListener('change', toggleModoReasign));
    document.querySelectorAll('[data-close-modal]').forEach(btn => btn.addEventListener('click', () => cerrarModal(btn.dataset.closeModal)));
    document.querySelectorAll('.modal-backdrop').forEach(bk => bk.addEventListener('click', e => { if (e.target === bk) cerrarModal(bk.id); }));
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      ['modal-asignar','modal-reasignar'].forEach(id => { if ($(id).classList.contains('open')) cerrarModal(id); });
    });

    cargarMesa();
    setInterval(() => { if (_reclamos.length) render(); }, 30000);
  </script>
</body>
</html>
