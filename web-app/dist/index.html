<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/web-app/dist/zaris-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZARIS · Gestión Estatal</title>
    <script>
      // Guard de produccion (CLAUDE.md §14): el bundle React NUNCA debe verse
      // standalone en prod, solo embebido en el iframe del shell vanilla.
      // Si alguien abre /zaris-zge/web-app/dist/index.html#/<modulo> directo,
      // lo redirigimos al shell vanilla preservando el hash como modulo activo.
      (function () {
        try {
          if (window.self !== window.top) return;                 // OK: embebido
          var p = window.location.pathname || '';
          // Activamos el redirect cuando se abre el bundle React standalone en prod.
          // Soporta dominio propio (zge.zaris.com.ar/web-app/dist/) y el path
          // legacy de GH Pages (/zaris-zge/web-app/dist/) por compatibilidad.
          var isProd = p.indexOf('/web-app/dist/') !== -1;
          if (!isProd) return;                                     // dev local: dejar pasar
          var hash = window.location.hash || '';                   // ej '#/ot/agente'
          // Detectar si estamos bajo un subpath (/zaris-zge/) o en raiz del dominio
          var subpath = p.match(/^(\/[^/]+)\/web-app\/dist\//);
          var base = subpath ? subpath[1] + '/index.html' : '/index.html';
          var target = base;
          if (hash && hash.length > 1) {
            target += '?modulo=' + encodeURIComponent('web-app/dist/index.html' + hash);
          }
          window.location.replace(target);
        } catch (e) { /* fail-open */ }
      })();
    </script>
    <script type="module" crossorigin src="/web-app/dist/assets/index-Cb41-Umk.js"></script>
    <link rel="stylesheet" crossorigin href="/web-app/dist/assets/index-CArlS0rb.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
