<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZARIS · Gestión Estatal</title>

  <link rel="icon" type="image/svg+xml" href="design-system/assets/zaris-favicon.svg">

  <link rel="stylesheet" href="design-system/fonts/fonts.css">
  <link rel="stylesheet" href="design-system/colors_and_type.css">
  <link rel="stylesheet" href="frontend/css/menu.css">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<body>
  <div class="app">

    <!-- ── Topbar global ── -->
    <header class="topbar" role="banner">
      <a class="brand" href="index.html" aria-label="ZARIS — Inicio">
        <svg class="brand__mark" viewBox="0 0 500 500" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="34"
             stroke-linecap="round" stroke-linejoin="round">
            <path d="M 110 78 L 388 78"/>
            <path d="M 388 78 L 110 430"/>
            <path d="M 388 220 L 222 430"/>
            <path d="M 388 362 L 334 430"/>
          </g>
        </svg>
        <span class="brand__name">ZARIS</span>
      </a>

      <div class="topbar__right">
        <!-- Campana de notificaciones (placeholder visual, sin logica todavia) -->
        <button
          class="topbar__bell"
          id="topbar-bell"
          type="button"
          aria-label="Notificaciones"
          title="Notificaciones (proximamente)"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
        </button>

        <div class="user-menu" id="user-menu">
          <button class="user-menu__trigger" id="user-menu-trigger" aria-haspopup="true" aria-expanded="false">
            <span class="topbar__context" id="topbar-context">
              <strong>—</strong>
            </span>
            <div class="topbar__avatar" id="topbar-avatar">—</div>
          </button>
          <div class="user-menu__dropdown" id="user-menu-dropdown" hidden>
            <div class="user-menu__info" id="user-menu-info"></div>
            <div class="user-menu__divider"></div>
            <button class="user-menu__item user-menu__item--danger" id="btn-logout">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </header>

    <aside class="sidebar" aria-label="Menú principal">
      <nav class="nav-flat" id="nav" aria-label="Navegación principal">

        <a class="nav-flat__item" href="frontend/welcome.html" data-flat-home>

            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>

          <span>dashboard</span>

          <span>ciudadanos</span>

        <a class="nav-flat__item" href="web-app/dist/index.html#/empresas" data-modulo="padrones">
          <svg class="nav-flat__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <path d="M9 22v-4h6v4M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>
          </svg>
          <span>empresas</span>
        </a>

        <a class="nav-flat__item" href="web-app/dist/index.html#/reclamos" data-modulo="reclamos">
          <svg class="nav-flat__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>reclamos</span>
        </a>

        <!-- OT: link plano (lleva por default a supervisor). Las 3 mesas se eligen
             dentro del módulo OT via tabs internas en futura sub-fase. Por ahora,
             el shell vanilla mantiene 3 data-modulo via JS si necesita filtrar. -->
        <a class="nav-flat__item" href="web-app/dist/index.html#/ot/supervisor" data-modulo="ot_supervisor" data-modulo-fallback="ot_agente,ot_auditoria">
          <svg class="nav-flat__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 2h6a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v0a2 2 0 0 1 2-2z"/>
            <path d="M9 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3"/>
            <path d="M9 12h6M9 16h6"/>
          </svg>
          <span>OT</span>
        </a>

        <a class="nav-flat__item" href="frontend/usuarios.html" data-modulo="usuarios">
          <svg class="nav-flat__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>

            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>maestros</span>
        </a>

      </nav>

      <footer class="sidebar__foot">zaris-zge · v0.1</footer>
    </aside>

    <!-- ── Canvas ── -->
    <main class="canvas" id="canvas">
      <iframe id="module-frame" src="frontend/welcome.html" title="Módulo activo"></iframe>
    </main>

  </div>

  <script>
    // Guard de sesión — redirige al login si no hay sesión activa
    if (!localStorage.getItem('zaris_session')) {
      window.location.replace('frontend/login.html');
    }
  </script>
  <script src="frontend/js/menu.js"></script>
</body>
</html>
