<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZARIS · Gestión Estatal</title>

  <link rel="icon" type="image/svg+xml" href="design-system/assets/zaris-favicon.svg">

  <link rel="stylesheet" href="design-system/fonts/fonts.css">
  <link rel="stylesheet" href="design-system/colors_and_type.css">
  <link rel="stylesheet" href="frontend/css/menu.css?v=2026-05-13c">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Guard de sesion — debe ejecutarse ANTES de que el iframe del modulo
       monte y haga su primer request al backend. Sin esto, el bundle React
       arranca, recibe 401 del API, y redirige el iframe al login con un
       path mal calculado, mostrando 404 de GH Pages. -->
  <script>
    if (!localStorage.getItem('zaris_session')) {
      window.location.replace('frontend/login.html');
    }
  </script>
</head>
<body>
  <div class="app">

    <!-- ── Topbar global ── -->
    <header class="topbar" role="banner">
      <div class="topbar__left">
        <a class="brand" href="index.html" aria-label="ZARIS — Inicio">
          <svg class="brand__mark" viewBox="0 0 500 500" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="34"
               stroke-linecap="round" stroke-linejoin="round">
              <path d="M 110 78 L 388 78"/>
              <path d="M 388 78 L 110 430"/>
              <path d="M 388 220 L 222 430"/>
              <path d="M 388 362 L 334 430"/>
            </g>
          </svg>
          <span class="brand__name">ZARIS</span>
          <span class="brand__app" id="topbar-app-nombre">GESTION ESTADO</span>
        </a>

        <span class="topbar__sep" aria-hidden="true"></span>

        <!-- Identidad del municipio: logo (opcional) + nombre. La cargan menu.js
             desde /api/v1/config/identidad. Si municipio_logo_url esta vacio,
             el <img> queda oculto y solo se muestra el texto. -->
        <div class="muni" id="topbar-muni">
          <img class="muni__logo" id="topbar-muni-logo" alt="Logo municipio" hidden>
          <span class="muni__nombre" id="topbar-muni-nombre">MUNICIPALIDAD</span>
        </div>
      </div>

      <div class="topbar__center">
        <!-- Fecha y hora del cliente. menu.js la inicializa y refresca cada 30s. -->
        <time class="topbar__clock" id="topbar-clock" datetime="">—</time>
      </div>

      <div class="topbar__right">
        <!-- Campana de notificaciones (placeholder visual, sin logica todavia) -->
        <button
          class="topbar__bell"
          id="topbar-bell"
          type="button"
          aria-label="Notificaciones"
          title="Notificaciones (proximamente)"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
        </button>

        <div class="user-menu" id="user-menu">
          <button class="user-menu__trigger" id="user-menu-trigger" aria-haspopup="true" aria-expanded="false">
            <span class="topbar__context" id="topbar-context">
              <strong>—</strong>
            </span>
            <div class="topbar__avatar" id="topbar-avatar">—</div>
          </button>
          <div class="user-menu__dropdown" id="user-menu-dropdown" hidden>
            <div class="user-menu__info" id="user-menu-info"></div>
            <div class="user-menu__divider"></div>
            <button class="user-menu__item user-menu__item--danger" id="btn-logout">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </header>

        <a class="nav-flat__item" href="frontend/admin_tablas.html?tabla=agentes" data-modulo="admin_tablas">

        <a class="nav-flat__item" href="web-app/dist/index.html#/config/identidad" data-modulo="usuarios">
          <svg class="nav-flat__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>

      </nav>

      <footer class="sidebar__foot">zaris-zge · v0.1</footer>

    <!-- ── Canvas ── -->
    <main class="canvas" id="canvas">
      <iframe id="module-frame" src="web-app/dist/index.html#/dashboard" title="Módulo activo"></iframe>

  </div>
